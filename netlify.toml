[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8889
  autoLaunch = false


[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

