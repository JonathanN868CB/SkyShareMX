
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Courier+Prime&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .page { font-family: 'Montserrat', sans-serif; background: #1a1a18; padding: 28px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .card { background: #232322; border: 0.5px solid rgba(212,160,23,0.18); border-radius: 8px; padding: 44px 48px 40px; display: flex; flex-direction: column; align-items: center; gap: 28px; width: 100%; max-width: 480px; }

  .radar-scene { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
  .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(212,160,23,0.25); }
  .ring-1 { width: 120px; height: 120px; }
  .ring-2 { width: 82px;  height: 82px;  border-color: rgba(212,160,23,0.18); }
  .ring-3 { width: 46px;  height: 46px;  border-color: rgba(212,160,23,0.12); }
  .crosshair-h { position: absolute; width: 100%; height: 0.5px; background: rgba(212,160,23,0.15); }
  .crosshair-v { position: absolute; height: 100%; width: 0.5px; background: rgba(212,160,23,0.15); }
  .sweep-wrap { position: absolute; width: 50%; height: 50%; top: 0; left: 50%; transform-origin: 0% 100%; animation: sweep 3s linear infinite; }
  .sweep-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 1.5px; background: linear-gradient(to right, transparent, rgba(212,160,23,0.95)); transform-origin: left center; }
  .sweep-glow { position: absolute; width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(from 0deg, rgba(212,160,23,0.14) 0deg, transparent 55deg); animation: sweep 3s linear infinite; transform-origin: 50% 50%; top: 0; left: 0; }
  @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .lock-center { position: absolute; display: flex; align-items: center; justify-content: center; }
  .contact { position: absolute; width: 7px; height: 7px; border-radius: 50%; background: #e74c3c; top: 28px; left: 72px; animation: contact-blink 3s 0.72s ease-out infinite; box-shadow: 0 0 4px rgba(231,76,60,0.8); }
  .contact-2 { top: 68px; left: 20px; animation: contact-blink 3s 1.95s ease-out infinite; width: 5px; height: 5px; }
  @keyframes contact-blink { 0%,100%{opacity:0} 2%{opacity:1} 15%{opacity:0.7} 30%{opacity:0} }

  .radio-box { background: rgba(0,0,0,0.5); border: 0.5px solid rgba(212,160,23,0.35); border-radius: 3px; padding: 16px 18px; width: 100%; font-family: 'Courier Prime', 'Courier New', monospace; font-size: 12px; line-height: 2.1; letter-spacing: 0.03em; }
  .radio-line { overflow: hidden; white-space: nowrap; width: 0; display: block; }
  .tower  { color: #D4A017; }
  .user   { color: #ffffff; }
  .denied { color: #e74c3c; font-weight: 600; }
  .l1 { animation: type 0.6s 0.4s  steps(28,end) forwards; }
  .l2 { animation: type 0.7s 1.2s  steps(34,end) forwards; }
  .l3 { animation: type 0.5s 2.1s  steps(24,end) forwards; }
  .l4 { animation: type 0.8s 2.8s  steps(38,end) forwards; }
  @keyframes type { to { width: 100%; } }
  .cursor { display: inline-block; width: 7px; height: 12px; background: #e74c3c; vertical-align: middle; margin-left: 2px; animation: cur 0.8s 3.6s step-end infinite; opacity: 0; }
  @keyframes cur { 0%,100%{opacity:0} 50%{opacity:1} }

  .headline { text-align: center; }
  .hl-tag  { font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase; color: #e74c3c; font-weight: 600; margin-bottom: 10px; display: block; animation: fadein 0.5s 3.8s ease forwards; opacity: 0; }
  .hl-main { font-size: 18px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #ffffff; line-height: 1.2; display: block; animation: fadein 0.5s 4.0s ease forwards; opacity: 0; }
  .hl-sub  { font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.6); letter-spacing: 0.03em; line-height: 1.8; margin-top: 10px; display: block; animation: fadein 0.5s 4.3s ease forwards; opacity: 0; }
  @keyframes fadein { to { opacity: 1; } }

  .divider { width: 100%; height: 0.5px; background: linear-gradient(to right, transparent, rgba(212,160,23,0.3), transparent); animation: fadein 0.4s 4.1s ease forwards; opacity: 0; }
</style>

<div class="page">
  <div class="card">

    <div class="radar-scene">
      <div class="sweep-glow"></div>
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="crosshair-h"></div>
      <div class="crosshair-v"></div>
      <div class="sweep-wrap"><div class="sweep-line"></div></div>
      <div class="contact"></div>
      <div class="contact contact-2"></div>
      <div class="lock-center">
        <svg width="18" height="20" viewBox="0 0 18 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="9" width="14" height="10" rx="2" stroke="#D4A017" stroke-width="1.5"/>
          <path d="M5 9V6a4 4 0 0 1 8 0v3" stroke="#D4A017" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="9" cy="14" r="1.5" fill="#D4A017" opacity="0.9"/>
        </svg>
      </div>
    </div>

    <div class="radio-box">
      <span class="radio-line l1 tower">Tower: Identify yourself...</span>
      <span class="radio-line l2 user">User: Requesting access to module.</span>
      <span class="radio-line l3 tower">Tower: Checking clearance...</span>
      <span class="radio-line l4 denied">Tower: ACCESS DENIED. Stand by.<span class="cursor"></span></span>
    </div>

    <div class="divider"></div>

    <div class="headline">
      <span class="hl-tag">&#9632; Restricted Airspace</span>
      <span class="hl-main">Clearance Required</span>
      <span class="hl-sub">You don't have permission to access this area.</span>
    </div>

  </div>
</div>
